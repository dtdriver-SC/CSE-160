<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ASG0 - Vector Operations</title>
    <style>
      body {
        font-family: Arial, sans-serif;
      }

      canvas {
        border: 1px solid black;
        display: block;
        margin-bottom: 12px;
      }

      .controls {
        margin-bottom: 12px;
      }

      .controls input,
      .controls select,
      .controls button {
        margin-right: 8px;
        margin-bottom: 8px;
      }
    </style>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>

    <div class="controls">
      <div>
        <strong>v1</strong>
        x: <input id="v1x" type="number" step="any" value="2.25" />
        y: <input id="v1y" type="number" step="any" value="2.25" />
      </div>

      <div>
        <strong>v2</strong>
        x: <input id="v2x" type="number" step="any" value="1.25" />
        y: <input id="v2y" type="number" step="any" value="1.25" />
      </div>

      <div>
        <input type="button" value="Draw" onclick="handleDrawEvent()" />
      </div>

      <div>
        <select id="operation">
          <option value="add">Add</option>
          <option value="sub">Sub</option>
          <option value="mul">Mul</option>
          <option value="div">Div</option>
          <option value="magnitude">Magnitude</option>
          <option value="normalize">Normalize</option>
          <option value="angle">Angle between</option>
          <option value="area">Area</option>
        </select>

        Scalar:
        <input id="scalar" type="number" step="any" value="2" />

        <input type="button" value="Draw Operation" onclick="handleDrawOperationEvent()" />
      </div>
    </div>

    <script src="./lib/cuon-matrix-cse160.js"></script>
    <script src="asg0.js"></script>
  </body>
</html>
